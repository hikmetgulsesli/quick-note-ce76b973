<span class="material-symbols-outlined" style="font-size: 14px;">error</span> Title is required.
                        </span>

</div>

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('note-editor-form');
            const titleInput = document.getElementById('note-title');
            const bodyInput = document.getElementById('note-body');
            const tagsInput = document.getElementById('note-tags');
            const titleError = document.getElementById('title-error');
            const saveBtn = document.getElementById('btn-save');
            const cancelBtn = document.getElementById('btn-cancel');
            const cancelTopBtn = document.getElementById('btn-cancel-top');
            const statusIndicator = document.getElementById('save-status');
            const statusIcon = statusIndicator.previousElementSibling;
            const unsavedNotice = document.getElementById('unsaved-notice');

            let isDirty = false;

            const markDirty = () => {
                if (!isDirty) {
                    isDirty = true;
                    statusIndicator.textContent = 'Unsaved changes';
                    statusIcon.textContent = 'sync_problem';
                    statusIndicator.parentElement.classList.add('text-secondary-fixed-dim');
                    unsavedNotice.classList.remove('hidden');
                }
            };

            const markClean = () => {
                isDirty = false;
                const now = new Date();
                const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                statusIndicator.textContent = `Last saved at ${timeString}`;
                statusIcon.textContent = 'cloud_done';
                statusIndicator.parentElement.classList.remove('text-secondary-fixed-dim');
                unsavedNotice.classList.add('hidden');
            };

            // Event Listeners for inputs
            titleInput.addEventListener('input', () => {
                markDirty();
                if (titleInput.value.trim() !== '') {
                    titleError.classList.add('hidden');
                    titleInput.classList.remove('border-error');
                }
            });
            bodyInput.addEventListener('input', markDirty);
            tagsInput.addEventListener('input', markDirty);

            // Save Action
            const handleSave = (e) => {
                e.preventDefault();
                if (titleInput.value.trim() === '') {
                    titleError.classList.remove('hidden');
                    titleInput.classList.add('border-error');
                    titleInput.focus();
                    return;
                }
                
                // Simulate save process
                saveBtn.textContent = 'Saving...';
                saveBtn.disabled = true;
                
                setTimeout(() => {
                    markClean();
                    saveBtn.textContent = 'Save Note';
                    saveBtn.disabled = false;
                }, 800);
            };

            saveBtn.addEventListener('click', handleSave);

            // Cancel Action
            const handleCancel = (e) => {
                e.preventDefault();
                if (isDirty) {
                    const confirmLeave = confirm('You have unsaved changes. Are you sure you want to leave?');
                    if (confirmLeave) {
                        // Navigate away logic here
                        console.log('Navigating away discarding changes');
                    }
                } else {
                    // Navigate away logic here
                    console.log('Navigating back to list');
                }
            };

            cancelBtn.addEventListener('click', handleCancel);
            cancelTopBtn.addEventListener('click', handleCancel);
            
            // Initial focus
            titleInput.focus();
        });
    </script>
